name: Bug Report
description: Report a problem with VeridianAI
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what went wrong.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: VeridianAI version
      placeholder: e.g. v2.12+
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS / Hardware
      placeholder: e.g. Windows 11, RTX 5060Ti
    validations:
      required: false